# Deploy บน Ubuntu server ที่ /DATA/AppData/www/newssra
#   1) cp .env.production.example .env.production  แล้วกรอกรหัสผ่านเอง
#   2) docker compose up -d --build
# แอปเปิดที่พอร์ต 3000 • ข้อมูล MySQL เก็บใน ./data/mysql • ไฟล์หลักฐานที่อัปโหลดเก็บใน ./data/uploads
#
# กรณีใช้ MySQL ที่มีอยู่แล้วบนเครื่อง host (ไม่ใช้ service db ด้านล่าง):
#   - ลบ/คอมเมนต์ service "db" และ depends_on ของ app
#   - ตั้ง DB_HOST=host.docker.internal ใน .env.production (มี extra_hosts รองรับแล้ว)

services:
  app:
    build: .
    container_name: newssra-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env.production
    volumes:
      - ./data/uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # ใช้ MySQL ที่ติดตั้งอยู่บนเครื่อง host แล้ว (ตั้ง DB_HOST=host.docker.internal ใน .env.production)
    # depends_on:
